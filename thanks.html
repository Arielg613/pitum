<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pitom — You're on the list!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #FAF7F2;
      color: #1C1611;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 5vw;
    }
    .candle { font-size: 3rem; margin-bottom: 24px; }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    h1 em { font-style: italic; color: #C8832A; }
    p {
      font-size: 1rem;
      color: #4A3F35;
      font-weight: 300;
      max-width: 44ch;
      margin-bottom: 36px;
    }
    a {
      background: #C8832A;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 12px 28px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #E4A84B; }
  </style>
</head>
<body>
  <div class="candle">🕯️</div>
  <h1>תודה! — <em>You're on the list.</em></h1>
  <p>We'll reach out as soon as a spot opens up. In the meantime, keep learning.</p>
  <a href="https://arielg613.github.io/pitum/">Back to Pitom</a>
</body>
</html>
