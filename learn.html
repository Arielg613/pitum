<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pitom — Learn Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #FAF7F2;
      --cream-2:  #F3EDE3;
      --ink:      #1C1611;
      --ink-soft: #4A3F35;
      --gold:     #C8832A;
      --gold-lt:  #E4A84B;
      --gold-bg:  #FDF3E2;
      --border:   rgba(28,22,17,0.10);
      --green:    #27C93F;
      --serif:    'Fraunces', Georgia, serif;
      --sans:     'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--sans);
      min-height: 100svh;
      line-height: 1.55;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5vw;
      height: 62px;
      background: rgba(250,247,242,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
    }
    .logo span { color: var(--gold); font-style: italic; font-weight: 300; font-size: 0.9rem; margin-left: 5px; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-user { font-size: 0.85rem; color: var(--ink-soft); }
    .nav-user strong { color: var(--ink); font-weight: 600; }
    .signout {
      font-size: 0.82rem;
      color: var(--ink-soft);
      background: none;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .signout:hover { border-color: var(--gold); color: var(--gold); }

    /* ── LAYOUT ── */
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 36px 5vw 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }
    @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } }

    .panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 36px rgba(28,22,17,0.06);
    }

    .panel-title {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .panel-sub {
      font-size: 0.85rem;
      color: var(--ink-soft);
      font-weight: 300;
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }
    .field { margin-bottom: 18px; }

    select, input[type="text"] {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: var(--cream);
      font-family: var(--sans);
      font-size: 0.92rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }
    select:focus, input[type="text"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200,131,42,0.12);
    }
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute; right: 15px; top: 50%;
      transform: translateY(-50%);
      color: var(--ink-soft); pointer-events: none; font-size: 0.8rem;
    }

    .ref-preview {
      background: var(--gold-bg);
      border: 1px dashed rgba(200,131,42,0.4);
      border-radius: 12px;
      padding: 14px 16px;
      margin: 4px 0 20px;
      font-size: 0.9rem;
      color: var(--ink-soft);
    }
    .ref-preview strong {
      display: block;
      font-family: var(--serif);
      font-size: 1.15rem;
      color: var(--gold);
      font-weight: 600;
      margin-top: 2px;
    }

    .go-btn {
      width: 100%;
      background: var(--gold);
      color: #fff;
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 500;
      padding: 14px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(200,131,42,0.25);
    }
    .go-btn:hover { background: var(--gold-lt); transform: translateY(-1px); }
    .go-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .go-btn.live {
      background: #fff;
      color: #c0392b;
      border: 1px solid rgba(192,57,43,0.4);
      box-shadow: none;
    }
    .go-btn.live:hover { background: #fff5f5; }

    .live-status {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--green);
      font-weight: 500;
    }
    .live-status.on { display: flex; }
    .live-dot {
      width: 9px; height: 9px; background: var(--green); border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.75);} }

    /* ── FEED ── */
    .feed-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .online-count {
      font-size: 0.78rem;
      color: var(--ink-soft);
      background: var(--cream-2);
      padding: 4px 11px;
      border-radius: 100px;
      border: 1px solid var(--border);
    }
    .feed-list { display: flex; flex-direction: column; gap: 10px; }

    .feed-empty {
      text-align: center;
      color: var(--ink-soft);
      font-size: 0.9rem;
      font-weight: 300;
      padding: 40px 10px;
    }
    .feed-empty .em { font-family: var(--serif); font-style: italic; color: var(--gold); }

    .user-row {
      display: flex;
      align-items: center;
      gap: 13px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 12px 15px;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .user-row.match {
      border-color: var(--gold);
      background: var(--gold-bg);
      box-shadow: 0 4px 16px rgba(200,131,42,0.12);
    }
    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem; flex-shrink: 0;
      background: #fff;
      border: 2px solid rgba(200,131,42,0.25);
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-weight: 600; font-size: 0.9rem; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 7px;
    }
    .match-badge {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: #fff; background: var(--gold);
      padding: 2px 7px; border-radius: 100px;
    }
    .you-badge {
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--ink-soft);
      background: var(--cream-2); border: 1px solid var(--border);
      padding: 2px 7px; border-radius: 100px;
    }
    .user-meta {
      font-size: 0.76rem; color: var(--ink-soft);
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    }
    .user-topic {
      display: inline-block; background: #fff; color: var(--gold);
      font-size: 0.72rem; font-weight: 600; padding: 3px 9px;
      border-radius: 100px; border: 1px solid rgba(200,131,42,0.3);
      flex-shrink: 0;
    }
    .match .user-topic { background: var(--gold); color: #fff; border-color: var(--gold); }
    .join-btn {
      background: var(--gold); color: #fff; font-size: 0.78rem; font-weight: 500;
      padding: 8px 16px; border-radius: 100px; border: none; cursor: pointer;
      flex-shrink: 0; transition: background 0.2s, transform 0.15s;
    }
    .join-btn:hover { background: var(--gold-lt); transform: scale(1.04); }
    .join-btn:disabled { background: var(--cream-2); color: var(--ink-soft); cursor: default; }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0; background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px; z-index: 200;
    }
    #loader .spark { font-size: 2rem; animation: pulse 1.5s infinite; }
    #loader p { color: var(--ink-soft); font-size: 0.9rem; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120%);
      background: var(--ink); color: var(--cream);
      padding: 13px 22px; border-radius: 100px; font-size: 0.88rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25); z-index: 150;
      transition: transform 0.3s ease; max-width: 90vw; text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spark">🕯️</div>
    <p>Loading Pitom…</p>
  </div>

  <nav>
    <a class="logo" href="index.html">Pitom <span>פִּתְאוֹם</span></a>
    <div class="nav-right">
      <span class="nav-user">Hi, <strong id="nav-name">there</strong></span>
      <button class="signout" id="signout-btn">Sign out</button>
    </div>
  </nav>

  <div class="wrap">

    <!-- LEFT: what are you learning -->
    <div class="panel">
      <div class="panel-title">What are you learning?</div>
      <div class="panel-sub">Pick your text, go live, and we'll match you with others learning the same thing.</div>

      <div class="live-status" id="live-status">
        <span class="live-dot"></span> You're live — learning <strong id="live-ref" style="margin-left:4px;"></strong>
      </div>

      <div class="field">
        <label>Type of text</label>
        <div class="select-wrap">
          <select id="category"></select>
        </div>
      </div>

      <div class="field">
        <label id="book-label">Text</label>
        <div class="select-wrap">
          <select id="book"></select>
        </div>
      </div>

      <div class="field" id="location-field">
        <label id="location-label">Location</label>
        <input type="text" id="location" placeholder="" autocomplete="off" />
      </div>

      <div class="ref-preview">
        Right now I'm learning:
        <strong id="ref-preview">—</strong>
      </div>

      <button class="go-btn" id="go-btn">Go live →</button>
    </div>

    <!-- RIGHT: who's online -->
    <div class="panel">
      <div class="feed-head">
        <div>
          <div class="panel-title">Learning right now</div>
        </div>
        <div class="online-count" id="online-count">0 online</div>
      </div>
      <div class="feed-list" id="feed-list">
        <div class="feed-empty">
          <p>No one's live yet.<br><span class="em">Be the first — go live and start the fire.</span> 🕯️</p>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc,
      collection, onSnapshot, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7Fkq-vhz4193HV5NqzyEYhNgw4x1LL6c",
      authDomain: "pitum-77bac.firebaseapp.com",
      projectId: "pitum-77bac",
      storageBucket: "pitum-77bac.firebasestorage.app",
      messagingSenderId: "143903138582",
      appId: "1:143903138582:web:b3446f79205be35ce8e637",
      measurementId: "G-X9C34T1EEV"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    /* ───────────────────────────────────────────────
       TEXT LIBRARY
       Curated, hierarchical catalog of Jewish texts.
       Each category defines how a "location" is entered
       and how the final reference string is built.
    ─────────────────────────────────────────────── */
    const LIBRARY = {
      tanach: {
        label: "Tanach (Torah, Nevi'im, Ketuvim)",
        bookLabel: "Book",
        locationLabel: "Chapter : Verse",
        placeholder: "e.g. 12:3",
        books: [
          "— Torah —",
          "Genesis", "Exodus", "Leviticus", "Numbers", "Deuteronomy",
          "— Nevi'im (Prophets) —",
          "Joshua", "Judges", "I Samuel", "II Samuel", "I Kings", "II Kings",
          "Isaiah", "Jeremiah", "Ezekiel",
          "Hosea", "Joel", "Amos", "Obadiah", "Jonah", "Micah", "Nahum",
          "Habakkuk", "Zephaniah", "Haggai", "Zechariah", "Malachi",
          "— Ketuvim (Writings) —",
          "Psalms", "Proverbs", "Job", "Song of Songs", "Ruth", "Lamentations",
          "Ecclesiastes", "Esther", "Daniel", "Ezra", "Nehemiah",
          "I Chronicles", "II Chronicles"
        ]
      },
      parsha: {
        label: "Parsha (Weekly Torah portion)",
        bookLabel: "Parsha",
        locationLabel: "Aliyah / verse (optional)",
        placeholder: "e.g. 2nd aliyah (optional)",
        locationOptional: true,
        books: [
          "Bereshit", "Noach", "Lech-Lecha", "Vayera", "Chayei Sara", "Toldot",
          "Vayetzei", "Vayishlach", "Vayeshev", "Miketz", "Vayigash", "Vayechi",
          "Shemot", "Vaera", "Bo", "Beshalach", "Yitro", "Mishpatim", "Terumah",
          "Tetzaveh", "Ki Tisa", "Vayakhel", "Pekudei",
          "Vayikra", "Tzav", "Shmini", "Tazria", "Metzora", "Achrei Mot",
          "Kedoshim", "Emor", "Behar", "Bechukotai",
          "Bamidbar", "Nasso", "Behaalotcha", "Shlach", "Korach", "Chukat",
          "Balak", "Pinchas", "Matot", "Masei",
          "Devarim", "Vaetchanan", "Eikev", "Re'eh", "Shoftim", "Ki Teitzei",
          "Ki Tavo", "Nitzavim", "Vayeilech", "Haazinu", "Vezot Haberachah"
        ]
      },
      gemara: {
        label: "Gemara (Talmud Bavli)",
        bookLabel: "Masechet",
        locationLabel: "Daf + Amud",
        placeholder: "e.g. 23b",
        books: [
          "— Seder Zeraim —",
          "Berakhot",
          "— Seder Moed —",
          "Shabbat", "Eruvin", "Pesachim", "Rosh Hashanah", "Yoma", "Sukkah",
          "Beitzah", "Taanit", "Megillah", "Moed Katan", "Chagigah",
          "— Seder Nashim —",
          "Yevamot", "Ketubot", "Nedarim", "Nazir", "Sotah", "Gittin", "Kiddushin",
          "— Seder Nezikin —",
          "Bava Kamma", "Bava Metzia", "Bava Batra", "Sanhedrin", "Makkot",
          "Shevuot", "Avodah Zarah", "Horayot",
          "— Seder Kodashim —",
          "Zevachim", "Menachot", "Chullin", "Bekhorot", "Arakhin", "Temurah",
          "Keritot", "Meilah", "Tamid",
          "— Seder Tahorot —",
          "Niddah"
        ]
      },
      mishna: {
        label: "Mishna",
        bookLabel: "Masechet",
        locationLabel: "Chapter : Mishna",
        placeholder: "e.g. 1:1",
        books: [
          "— Seder Zeraim —",
          "Berakhot", "Peah", "Demai", "Kilayim", "Sheviit", "Terumot",
          "Maasrot", "Maaser Sheni", "Challah", "Orlah", "Bikkurim",
          "— Seder Moed —",
          "Shabbat", "Eruvin", "Pesachim", "Shekalim", "Yoma", "Sukkah",
          "Beitzah", "Rosh Hashanah", "Taanit", "Megillah", "Moed Katan", "Chagigah",
          "— Seder Nashim —",
          "Yevamot", "Ketubot", "Nedarim", "Nazir", "Sotah", "Gittin", "Kiddushin",
          "— Seder Nezikin —",
          "Bava Kamma", "Bava Metzia", "Bava Batra", "Sanhedrin", "Makkot",
          "Shevuot", "Eduyot", "Avodah Zarah", "Avot", "Horayot",
          "— Seder Kodashim —",
          "Zevachim", "Menachot", "Chullin", "Bekhorot", "Arakhin", "Temurah",
          "Keritot", "Meilah", "Tamid", "Middot", "Kinnim",
          "— Seder Tahorot —",
          "Kelim", "Oholot", "Negaim", "Parah", "Tahorot", "Mikvaot", "Niddah",
          "Makhshirin", "Zavim", "Tevul Yom", "Yadayim", "Oktzin"
        ]
      },
      rambam: {
        label: "Rambam (Mishneh Torah)",
        bookLabel: "Book",
        locationLabel: "Halachot + chapter (optional)",
        placeholder: "e.g. Hilchot Teshuvah 3:4",
        locationOptional: true,
        books: [
          "Sefer HaMadda", "Sefer Ahavah", "Sefer Zemanim", "Sefer Nashim",
          "Sefer Kedushah", "Sefer Haflaah", "Sefer Zeraim", "Sefer Avodah",
          "Sefer Korbanot", "Sefer Taharah", "Sefer Nezikin", "Sefer Kinyan",
          "Sefer Mishpatim", "Sefer Shofetim"
        ]
      }
    };

    const isHeader = (s) => s.startsWith("—");

    /* ─── DOM refs ─── */
    const loader      = document.getElementById('loader');
    const navName     = document.getElementById('nav-name');
    const categorySel = document.getElementById('category');
    const bookSel     = document.getElementById('book');
    const bookLabel   = document.getElementById('book-label');
    const locationFld = document.getElementById('location-field');
    const locationLbl = document.getElementById('location-label');
    const locationInp = document.getElementById('location');
    const refPreview  = document.getElementById('ref-preview');
    const goBtn       = document.getElementById('go-btn');
    const liveStatus  = document.getElementById('live-status');
    const liveRef     = document.getElementById('live-ref');
    const feedList    = document.getElementById('feed-list');
    const onlineCount = document.getElementById('online-count');
    const signoutBtn  = document.getElementById('signout-btn');
    const toastEl     = document.getElementById('toast');

    let currentUser = null;
    let profile = null;
    let isLive = false;
    let heartbeat = null;

    /* ─── Build category dropdown ─── */
    Object.entries(LIBRARY).forEach(([key, cat]) => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = cat.label;
      categorySel.appendChild(opt);
    });

    function populateBooks() {
      const cat = LIBRARY[categorySel.value];
      bookLabel.textContent = cat.bookLabel;
      bookSel.innerHTML = '';
      cat.books.forEach(b => {
        const opt = document.createElement('option');
        opt.value = isHeader(b) ? '' : b;
        opt.textContent = b;
        if (isHeader(b)) { opt.disabled = true; opt.style.color = '#b0a090'; }
        bookSel.appendChild(opt);
      });
      // select first real book
      const firstReal = cat.books.find(b => !isHeader(b));
      bookSel.value = firstReal || '';
      locationLbl.textContent = cat.locationLabel;
      locationInp.value = '';
      locationInp.placeholder = cat.placeholder;
      updatePreview();
    }

    function buildRef() {
      const cat = LIBRARY[categorySel.value];
      const book = bookSel.value;
      const loc = locationInp.value.trim();
      if (!book) return '';
      if (!loc) return book;            // book-only (parsha, or no location given)
      return `${book} ${loc}`;
    }

    function updatePreview() {
      const ref = buildRef();
      refPreview.textContent = ref || '—';
      if (!isLive) goBtn.disabled = !bookSel.value;
    }

    categorySel.addEventListener('change', populateBooks);
    bookSel.addEventListener('change', updatePreview);
    locationInp.addEventListener('input', updatePreview);

    populateBooks();

    /* ─── Toast ─── */
    let toastTimer = null;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
    }

    /* ─── Presence: go live / stop ─── */
    async function goLive() {
      const ref = buildRef();
      if (!ref) { toast('Pick a text first.'); return; }
      const cat = LIBRARY[categorySel.value];
      try {
        await setDoc(doc(db, 'presence', currentUser.uid), {
          uid: currentUser.uid,
          name: profile.name || currentUser.displayName || 'Anonymous',
          photoURL: currentUser.photoURL || '',
          city: profile.city || '',
          level: profile.level || '',
          language: profile.language || '',
          category: categorySel.value,
          categoryLabel: cat.label,
          book: bookSel.value,
          location: locationInp.value.trim(),
          ref,
          online: true,
          updatedAt: serverTimestamp()
        });
        setLiveState(true, ref);
        startHeartbeat();
        toast("You're live! 🕯️");
      } catch (e) {
        console.error(e);
        toast('Could not go live. Try again.');
      }
    }

    async function stopLive() {
      stopHeartbeat();
      try {
        await deleteDoc(doc(db, 'presence', currentUser.uid));
      } catch (e) { console.error(e); }
      setLiveState(false);
      toast('You went offline.');
    }

    function setLiveState(on, ref) {
      isLive = on;
      if (on) {
        liveStatus.classList.add('on');
        liveRef.textContent = ref;
        goBtn.textContent = 'Stop — go offline';
        goBtn.classList.add('live');
        goBtn.disabled = false;
        categorySel.disabled = bookSel.disabled = locationInp.disabled = true;
      } else {
        liveStatus.classList.remove('on');
        goBtn.textContent = 'Go live →';
        goBtn.classList.remove('live');
        categorySel.disabled = bookSel.disabled = locationInp.disabled = false;
        updatePreview();
      }
    }

    function startHeartbeat() {
      stopHeartbeat();
      // Refresh updatedAt every 60s so we stay "fresh" in others' feeds.
      heartbeat = setInterval(() => {
        updateDoc(doc(db, 'presence', currentUser.uid), {
          updatedAt: serverTimestamp()
        }).catch(e => console.error(e));
      }, 60000);
    }
    function stopHeartbeat() {
      if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
    }

    goBtn.addEventListener('click', () => { isLive ? stopLive() : goLive(); });

    // Best-effort: drop presence when leaving the page.
    window.addEventListener('pagehide', () => {
      if (isLive && currentUser) {
        // keepalive delete via navigator.sendBeacon isn't available for Firestore;
        // mark offline synchronously where possible.
        try { deleteDoc(doc(db, 'presence', currentUser.uid)); } catch (e) {}
      }
    });

    /* ─── Live feed ─── */
    const FRESH_MS = 5 * 60 * 1000; // consider users active within 5 min

    function renderFeed(docs) {
      const now = Date.now();
      // Filter to fresh, online users
      const people = docs
        .map(d => d.data())
        .filter(p => p.online && p.updatedAt && (now - p.updatedAt.toMillis()) < FRESH_MS);

      // My current book for match detection
      const myBook = isLive ? bookSel.value : null;
      const myRef  = isLive ? buildRef() : null;

      // Sort: matches first, then most recent
      people.sort((a, b) => {
        const am = myBook && a.book === myBook ? 1 : 0;
        const bm = myBook && b.book === myBook ? 1 : 0;
        if (am !== bm) return bm - am;
        return (b.updatedAt?.toMillis() || 0) - (a.updatedAt?.toMillis() || 0);
      });

      onlineCount.textContent = `${people.length} online`;

      if (people.length === 0) {
        feedList.innerHTML = `<div class="feed-empty"><p>No one's live yet.<br>
          <span class="em">Be the first — go live and start the fire.</span> 🕯️</p></div>`;
        return;
      }

      feedList.innerHTML = '';
      people.forEach(p => {
        const isMe = p.uid === currentUser.uid;
        const exactMatch = myRef && p.ref === myRef && !isMe;
        const bookMatch  = myBook && p.book === myBook && !isMe;

        const row = document.createElement('div');
        row.className = 'user-row' + (bookMatch ? ' match' : '');

        const initial = (p.name || '?').trim().charAt(0).toUpperCase();
        const avatar = p.photoURL
          ? `<div class="avatar"><img src="${p.photoURL}" alt="" referrerpolicy="no-referrer"></div>`
          : `<div class="avatar">${initial}</div>`;

        let badge = '';
        if (isMe) badge = `<span class="you-badge">You</span>`;
        else if (exactMatch) badge = `<span class="match-badge">Same daf!</span>`;
        else if (bookMatch) badge = `<span class="match-badge">Match</span>`;

        const metaBits = [];
        if (p.city) metaBits.push(escapeHtml(p.city));
        if (p.level) metaBits.push(cap(p.level));
        const meta = metaBits.join(' · ');

        const action = isMe
          ? `<button class="join-btn" disabled>That's you</button>`
          : `<button class="join-btn" data-name="${escapeHtml(p.name)}" data-ref="${escapeHtml(p.ref)}">Join</button>`;

        row.innerHTML = `
          ${avatar}
          <div class="user-info">
            <div class="user-name">${escapeHtml(p.name || 'Anonymous')} ${badge}</div>
            <div class="user-meta">
              ${meta ? `<span>${meta}</span><span>·</span>` : ''}
              <span class="user-topic">${escapeHtml(p.ref)}</span>
            </div>
          </div>
          ${action}
        `;
        feedList.appendChild(row);
      });

      // Wire up "Join" buttons (placeholder until live video exists)
      feedList.querySelectorAll('.join-btn:not([disabled])').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.name;
          toast(`We'll connect you with ${name} when live chavruta launches. 🤝`);
        });
      });
    }

    function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    /* ─── Auth gate ─── */
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        // Not signed in — send them to set up / sign in.
        window.location.href = 'profile-setup.html';
        return;
      }
      currentUser = user;

      // Load profile
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists() || !snap.data().profileComplete) {
          window.location.href = 'profile-setup.html';
          return;
        }
        profile = snap.data();
      } catch (e) {
        console.error(e);
        profile = { name: user.displayName };
      }

      navName.textContent = (profile.name || user.displayName || 'there').split(' ')[0];
      loader.style.display = 'none';

      // Subscribe to the live feed
      onSnapshot(collection(db, 'presence'), (snap) => {
        renderFeed(snap.docs);
      }, (err) => {
        console.error(err);
        toast('Live feed unavailable — check Firestore rules.');
      });
    });

    signoutBtn.addEventListener('click', async () => {
      if (isLive) { await stopLive(); }
      await signOut(auth);
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
